services:
  ml-api:
    build: .
    ports:
      - "8080:80"
    environment:
      - MODEL_VERSION=1.0
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
